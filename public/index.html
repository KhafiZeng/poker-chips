 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>德州扑克筹码模拟器</title>
   <link rel="stylesheet" href="style.css">
 </head>
 <body>
 
 <!-- ====== LOBBY ====== -->
 <div id="lobby" class="screen active">
   <div class="lobby-inner">
     <h1>🃏 德州扑克<br><span class="sub">筹码模拟器</span></h1>
     <div class="lobby-row">
    <div class="lobby-card">
      <h3>创建房间</h3>
      <p>创建一个新房间，邀请好友加入</p>
      <div class="join-form">
        <input id="inputHostName" placeholder="你的昵称" maxlength="8" autocomplete="off">
        <button id="btnCreateRoom">创建房间</button>
      </div>
    </div>
       <div class="lobby-card">
         <h3>加入房间</h3>
         <p>输入房号和昵称加入好友的房间</p>
         <div class="join-form">
           <input id="inputRoomCode" placeholder="房号" maxlength="4" autocomplete="off">
           <input id="inputPlayerName" placeholder="你的昵称" maxlength="8" autocomplete="off">
           <button id="btnJoinRoom">加入</button>
         </div>
       </div>
     </div>
     <div id="lobbyError" class="error-msg"></div>
   </div>
 </div>
 
 <!-- ====== ROOM LOBBY (waiting) ====== -->
 <div id="roomLobby" class="screen">
   <div class="room-lobby-inner">
     <h2>房间 <span id="roomCodeDisplay"></span></h2>
     <div class="conn-info">
       📡 连接地址: <span id="connAddress"></span>
     </div>
     <div class="player-list-wrap">
       <h3>玩家列表 (<span id="playerCount">0</span>)</h3>
       <ul id="playerList"></ul>
     </div>
     <div class="settings-wrap">
       <h3>游戏设置</h3>
       <div class="settings-grid">
         <label>起始筹码 <input id="setStartingChips" type="number" value="1000" min="100" step="100"></label>
         <label>小盲 <input id="setSb" type="number" value="10" min="1" step="5"></label>
         <label>大盲 <input id="setBb" type="number" value="20" min="2" step="5"></label>
       </div>
       <button id="btnUpdateSettings">更新设置</button>
     </div>
     <button id="btnStartGame" class="btn-primary">开始游戏</button>
   </div>
 </div>
 
 <!-- ====== GAME TABLE ====== -->
 <div id="game" class="screen">
   <div class="table-wrapper">
     <div class="table-glow"></div>
     <div class="table-felt" id="tableFelt">
       <!-- Players rendered by JS -->
       <div id="playerSeats"></div>
 
       <!-- Center area -->
       <div class="table-center">
         <div class="street-indicator" id="streetIndicator">等待开始</div>
         <div class="pot-display">底池 <span id="potAmount">0</span></div>
         <div class="community-cards" id="communityCards">
           <div class="card-slot" data-i="0"></div>
           <div class="card-slot" data-i="1"></div>
           <div class="card-slot" data-i="2"></div>
           <div class="card-slot" data-i="3"></div>
           <div class="card-slot" data-i="4"></div>
         </div>
         <!-- Winner selection (host only, during showdown) -->
         <div id="winnerPanel" class="winner-panel hidden">
           <h3>摊牌 — 选择赢家</h3>
           <div id="winnerOptions"></div>
         </div>
       </div>
     </div>
   </div>
 
   <!-- Action panel -->
   <div class="action-panel" id="actionPanel">
     <div class="action-row" id="actionRow">
       <button class="act-fold" data-action="fold">弃牌</button>
       <button class="act-check" data-action="check" id="btnCheck">过牌</button>
       <button class="act-call" data-action="call" id="btnCall">跟注</button>
       <div class="raise-group">
         <input type="number" id="raiseAmount" placeholder="加注额" min="20" step="10">
         <button class="act-raise" data-action="raise">加注</button>
       </div>
       <button class="act-allin" data-action="allin">All-in</button>
     </div>
   </div>
 
   <!-- Bottom bar -->
   <div class="bottom-bar">
     <div class="game-info">
       <span id="gameInfo">等待开始</span>
       <span class="blind-info" id="blindInfo">盲注 10/20</span>
     </div>
     <div class="bar-actions">
      <button id="btnNextHand" class="btn-small">下一局</button>
      <button id="btnEndGame" class="btn-small btn-danger">结束游戏</button>
      <button id="btnRebuy" class="btn-small">重购筹码</button>
      <button id="btnRebuyHistory" class="btn-small">购买记录</button>
      <button id="btnLeave" class="btn-small btn-danger">离开</button>
     </div>
   </div>
 
   <!-- Hand log -->
   <div id="handLog" class="hand-log"></div>
 </div>
 
 <!-- ====== REBUY MODAL ====== -->
 <div id="rebuyModal" class="modal-overlay hidden">
   <div class="modal-content">
     <h3>重购筹码</h3>
     <label>金额 <input type="number" id="rebuyAmount" value="1000" min="100" step="100"></label>
     <div class="modal-actions">
       <button id="btnRebuyConfirm">确认</button>
       <button id="btnRebuyCancel">取消</button>
     </div>
  </div>
</div>

<!-- ====== REBUY HISTORY ====== -->
<div id="rebuyPanel" class="loan-panel-overlay hidden">
  <div class="loan-panel">
    <div class="loan-header">
      <h3>购买记录</h3>
      <button id="btnRebuyClose">✕</button>
    </div>
    <div id="rebuyList" class="loan-list">
      <div class="loan-empty">暂无购买记录</div>
    </div>
  </div>
</div>

<!-- ====== GAME SUMMARY ====== -->
<div id="gameSummary" class="summary-overlay hidden">
  <div class="summary-panel">
    <div class="summary-header">
      <h2>🏆 游戏总结</h2>
      <button id="btnSummaryClose">✕</button>
    </div>
    <div id="summaryBody" class="summary-body"></div>
    <div class="summary-footer">
      <button id="btnRestartGame" class="btn-confirm">重新开始</button>
      <button id="btnSummaryClose2" class="btn-cancel">关闭</button>
    </div>
  </div>
</div>

 </body>
 </html>
